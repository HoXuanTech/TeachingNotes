<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>教學講義</title>
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <style>
        :root { --primary: #2c3e50; --bg: #f4f7f6; }

        /* 網頁顯示模式樣式 */
        body { 
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; 
            margin: 0; 
            display: flex; 
            height: 100vh; 
            background: var(--bg); 
            overflow: hidden;
        }

        #editor-side, #preview-side { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            padding: 20px; 
            box-sizing: border-box; 
        }

        #editor-side { border-right: 1px solid #ccc; background: #fff; }
        
        header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 15px; 
        }

        h2 { margin: 0; font-size: 1.1rem; color: var(--primary); }

        textarea { 
            flex: 1; 
            padding: 15px; 
            border: 1px solid #ddd; 
            border-radius: 8px; 
            font-size: 15px; 
            line-height: 1.6; 
            outline: none; 
            font-family: monospace; 
        }

        #preview { 
            flex: 1; 
            padding: 40px; 
            background: white; 
            border-radius: 8px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
            overflow-y: auto; 
            line-height: 2; 
            font-size: 1.15rem; 
            color: #333; 
        }

        button { 
            padding: 10px 20px; 
            background: var(--primary); 
            color: white; 
            border: none; 
            border-radius: 6px; 
            cursor: pointer; 
            font-weight: bold; 
        }

        /* 📄 專業 PDF 列印優化 (解決切斷與雜訊問題) */
        @media print {
            /* 1. 隱藏編輯介面 */
            #editor-side, header, button, .no-print { 
                display: none !important; 
            }

            /* 2. 重置文件流，確保跨頁正常 */
            body, html { 
                height: auto !important; 
                overflow: visible !important; 
                display: block !important; 
                background: white !important; 
            }

            #preview-side { 
                display: block !important; 
                width: 100% !important; 
                padding: 0 !important; 
                margin: 0 !important; 
            }

            #preview { 
                box-shadow: none !important; 
                padding: 0 !important; 
                margin: 0 !important; 
                height: auto !important; 
                overflow: visible !important; 
                display: block !important; 
                font-size: 12pt; 
                line-height: 1.8;
                color: black; 
            }

            /* 3. 分頁與內容保護 */
            h1, h2, h3 { 
                color: black !important; 
                page-break-after: avoid; 
                margin-top: 1.5em;
            }

            p, li { 
                page-break-inside: avoid; 
                margin-bottom: 0.8em;
            }

            /* 4. 強制邊距以擠壓掉頁首頁尾資訊 */
            @page {
                size: auto;
                margin: 20mm 15mm;
            }
        }
    </style>
</head>
<body>

    <div id="editor-side">
        <header>
            <h2>📝 內容編輯</h2>
            <button onclick="generatePDF()">📥 下載專業講義 PDF</button>
        </header>
        <textarea id="input" placeholder="貼上 AI 回覆的全文..."></textarea>
    </div>

    <div id="preview-side">
        <header class="no-print"><h2>📄 專業預覽</h2></header>
        <div id="preview"></div>
    </div>

    <script>
        const input = document.getElementById('input');
        const preview = document.getElementById('preview');

        window.MathJax = {
            tex: { 
                inlineMath: [['$', '$'], ['\\(', '\\)']], 
                displayMath: [['$$', '$$']] 
            }
        };

        function render() {
            let text = input.value;
            
            // 核心清洗邏輯：移除所有 與 
            text = text.replace(/\[cite.*?\]/g, "");

            // 渲染 Markdown
            preview.innerHTML = marked.parse(text);

            // 重新觸發 MathJax
            if (window.MathJax && window.MathJax.typesetPromise) {
                window.MathJax.typesetPromise([preview]);
            }
        }

        function generatePDF() {
            // 在列印前暫時清空標題，防止 PDF 頁首出現網頁名稱
            const originalTitle = document.title;
            document.title = " "; 
            window.print();
            // 列印完畢後恢復標題
            document.title = originalTitle;
        }

        input.addEventListener('input', render);

        // 初始化示範內容
        input.value = `# 國立中興大學物理筆試：歷年核心題型分析\n--\n## 一、力學 (Mechanics)\n物體在等加速度 $a$ 下運動的位移公式：\n$$ \\Delta x = v_0 t + \\frac{1}{2} a t^2 $$\n\n* **牛頓運動定律**：力圖分析、連接體問題 [cite: 380]。\n* **功與能**：$F-x$ 圖面積代表作功 [cite: 61]。`;
        render();
    </script>
</body>
</html>
