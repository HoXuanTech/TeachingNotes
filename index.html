<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 科學講義渲染器 - TeachingNotes</title>
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <style>
        :root { --primary: #2c3e50; --bg: #f4f7f6; }
        body { font-family: sans-serif; margin: 0; display: flex; height: 100vh; background: var(--bg); }
        #editor-side, #preview-side { flex: 1; display: flex; flex-direction: column; padding: 20px; box-sizing: border-box; }
        #editor-side { border-right: 1px solid #ccc; background: #fff; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        h2 { margin: 0; font-size: 1.1rem; color: var(--primary); }
        textarea { flex: 1; padding: 15px; border: 1px solid #ddd; border-radius: 8px; font-size: 15px; line-height: 1.6; outline: none; }
        #preview { flex: 1; padding: 40px; background: white; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); overflow-y: auto; line-height: 1.8; font-size: 1.1rem; color: #333; }
        button { padding: 10px 20px; background: var(--primary); color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        button:hover { opacity: 0.9; }

        /* PDF 列印優化 */
        @media print {
            #editor-side, header, .no-print { display: none !important; }
            body { background: white; }
            #preview-side { width: 100%; padding: 0; }
            #preview { box-shadow: none; padding: 0; font-size: 12pt; }
            h1, h2, h3 { color: black !important; }
        }
    </style>
</head>
<body>

    <div id="editor-side">
        <header>
            <h2>📝 內容編輯</h2>
            <button onclick="window.print()">📥 產生 PDF 講義</button>
        </header>
        <textarea id="input" placeholder="直接貼上 AI 回覆的全文..."></textarea>
    </div>

    <div id="preview-side">
        <header><h2>📄 預覽 (已過濾標籤與亂碼)</h2></header>
        <div id="preview"></div>
    </div>

    <script>
        const input = document.getElementById('input');
        const preview = document.getElementById('preview');

        window.MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']], displayMath: [['$$', '$$']] }
        };

        function render() {
            let text = input.value;
            
            // 【最強過濾邏輯】只要括號內包含 cite 字眼，整組標籤刪除
            // 處理 或 
            text = text.replace(/\[cite.*?\]/g, "");

            // 渲染 Markdown
            preview.innerHTML = marked.parse(text);

            // 重新渲染 LaTeX 公式
            if (window.MathJax && window.MathJax.typesetPromise) {
                window.MathJax.typesetPromise([preview]);
            }
        }

        input.addEventListener('input', render);

        // 初始化範例
        input.value = `# 中興大學物理題型總結\n當物體受力為 $F$ 時，加速度 $a$ 與質量 $m$ 的關係：\n$$ F = ma $$\n* 直線運動：包含 $x-t$ 圖判讀。`;
        render();
    </script>
</body>
</html>
