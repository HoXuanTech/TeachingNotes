<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> </title> <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <style>
        :root { --primary: #2c3e50; --bg: #f4f7f6; }

        /* 網頁顯示樣式 */
        body { 
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; 
            margin: 0; display: flex; height: 100vh; background: var(--bg); overflow: hidden;
        }

        #editor-side, #preview-side { flex: 1; display: flex; flex-direction: column; padding: 20px; box-sizing: border-box; }
        #editor-side { border-right: 1px solid #ccc; background: #fff; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        h2 { margin: 0; font-size: 1.1rem; color: var(--primary); }
        textarea { flex: 1; padding: 15px; border: 1px solid #ddd; border-radius: 8px; font-size: 15px; line-height: 1.6; outline: none; font-family: monospace; }
        
        #preview { 
            flex: 1; padding: 40px; background: white; border-radius: 8px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); overflow-y: auto; 
            line-height: 2; font-size: 1.15rem; color: #333; 
        }

        button { padding: 10px 25px; background: var(--primary); color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }

        /* 📄 專業 PDF 列印優化 (解決跨頁切斷與頁首頁尾) */
        @media print {
            /* 1. 隱藏編輯器 */
            #editor-side, header, button, .no-print { display: none !important; }

            /* 2. 強制解除 Flex 佈局，回歸標準流 */
            body, html { 
                height: auto !important; 
                overflow: visible !important; 
                display: block !important; 
                background: white !important; 
            }

            #preview-side { 
                display: block !important; 
                width: 100% !important; 
                padding: 0 !important; 
                margin: 0 !important; 
            }

            #preview { 
                box-shadow: none !important; 
                padding: 0 !important; 
                margin: 0 !important; 
                height: auto !important; 
                overflow: visible !important; 
                display: block !important; 
                font-size: 12pt; 
                color: black; 
                line-height: 1.7;
            }

            /* 3. 🔥 跨頁邊距控制：這是解決第二頁太近的關鍵 */
            @page {
                size: A4 portrait;
                margin: 25mm 20mm 20mm 20mm; /* 頂部留 2.5 公分，四周留 2 公分 */
            }

            /* 4. 分頁安全：確保標題不會被切一半 */
            h1, h2, h3 { 
                page-break-after: avoid; 
                margin-top: 2em; 
                border-bottom: 1px solid #eee;
                padding-bottom: 5px;
            }
            p, li { page-break-inside: avoid; margin-bottom: 10px; }
        }
    </style>
</head>
<body>

    <div id="editor-side">
        <header>
            <h2>📝 內容編輯</h2>
            <button onclick="safePrint()">📥 下載專業講義 PDF</button>
        </header>
        <textarea id="input" placeholder="貼上 Gemini 的回覆..."></textarea>
    </div>

    <div id="preview-side">
        <header class="no-print"><h2>📄 講義預覽</h2></header>
        <div id="preview"></div>
    </div>

    <script>
        const input = document.getElementById('input');
        const preview = document.getElementById('preview');

        window.MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']], displayMath: [['$$', '$$']] }
        };

        function render() {
            let text = input.value;
            // 暴力清洗所有引用標籤
            text = text.replace(/\[cite.*?\]/g, "");
            preview.innerHTML = marked.parse(text);

            if (window.MathJax && window.MathJax.typesetPromise) {
                window.MathJax.typesetPromise([preview]);
            }
        }

        function safePrint() {
            // 列印瞬間清空標題，防止頁頭出現網址或檔名
            const originalTitle = document.title;
            document.title = ""; 
            window.print();
            document.title = originalTitle;
        }

        input.addEventListener('input', render);
        
        // 初始化範例
        input.value = `# 物理筆試分析\n---\n## 一、力學題型分析\n物體受力為 $F$, 質量 $m$, 加速度 $a$：\n$$ F = ma $$\n* 直線運動圖形：$v-t$ 圖與 $x-t$ 圖判讀。`;
        render();
    </script>
</body>
</html>
